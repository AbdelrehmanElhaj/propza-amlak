services:
  db:
    image: postgres:15
    container_name: odoo17-db
    environment:
      - POSTGRES_USER=odoo17
      - POSTGRES_PASSWORD=odoo17
      - POSTGRES_DB=postgres
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - odoo-db-data:/var/lib/postgresql/data/pgdata
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo17"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  web:
    image: odoo:17.0
    container_name: odoo17
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8069"
    environment:
      - HOST=db
      - USER=odoo17
      - PASSWORD=odoo17
      # nginx-proxy routing
      - VIRTUAL_HOST=amlak.hdrelhaj.com
      - VIRTUAL_PORT=8069
      # Let's Encrypt
      - LETSENCRYPT_HOST=amlak.hdrelhaj.com
      - LETSENCRYPT_EMAIL=a.elhaj@proptech.sa
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
      - ./logs:/var/log/odoo
    restart: unless-stopped
    networks:
      - internal
      - web

volumes:
  odoo-web-data:
    driver: local
  odoo-db-data:
    driver: local

networks:
  internal:
    driver: bridge
  web:
    external: true
