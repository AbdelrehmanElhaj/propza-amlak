upstream odoo {
    server web:8069;
}

# HTTP — serve ACME challenge, redirect everything else to HTTPS
server {
    listen 80;
    server_name 16.16.212.220.nip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 16.16.212.220.nip.io;

    ssl_certificate     /etc/nginx/certs/nginx.crt;
    ssl_certificate_key /etc/nginx/certs/nginx.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                                always;
    add_header X-Frame-Options           SAMEORIGIN                             always;

    # Odoo proxy timeouts (longpolling needs long reads)
    proxy_read_timeout    720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout    720s;

    # Required Odoo proxy headers
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP         $remote_addr;

    # Allow large file uploads (attachments)
    client_max_body_size 512m;

    access_log /var/log/nginx/odoo_access.log;
    error_log  /var/log/nginx/odoo_error.log;

    # WebSocket — Odoo 17 bus (workers=0: same port as web)
    location /websocket {
        proxy_pass         http://odoo;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # Static assets — cache aggressively
    location ~* /web/static/ {
        proxy_pass      http://odoo;
        proxy_buffering on;
        expires         24h;
        add_header      Cache-Control "public, immutable";
    }

    # All other requests
    location / {
        proxy_pass      http://odoo;
        proxy_redirect  off;
        proxy_buffering off;
    }

    gzip            on;
    gzip_types      text/plain text/xml text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1400;
}
